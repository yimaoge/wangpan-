<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花少云盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        success: '#00B42A',
                        danger: '#F53F3F',
                        neutral: '#F2F3F5'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
            .btn-hover { transition: all 0.3s; }
            .btn-hover:hover { transform: translateY(-2px); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="authPage" class="flex items-center justify-center p-4 min-h-screen">
        <div class="w-full max-w-md bg-white rounded-2xl card-shadow p-6">
            <div class="text-center mb-6">
                <h1 class="text-[#165DFF] text-2xl font-bold mb-2">花少云盘</h1>
                <p class="text-gray-500" id="authTitle">用户登录</p>
            </div>

            <div id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-1 text-sm font-medium">用户名</label>
                    <input id="loginUser" class="border-gray-300 bg-gray-50 w-full p-3 rounded-lg border outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" placeholder="请输入用户名">
                </div>
                <div>
                    <label class="block text-gray-700 mb-1 text-sm font-medium">密码</label>
                    <input id="loginPwd" type="password" class="border-gray-300 bg-gray-50 w-full p-3 rounded-lg border outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" placeholder="请输入密码">
                </div>
                <button onclick="login()" class="bg-primary text-white w-full p-3 rounded-lg font-medium btn-hover">登录</button>
                <p class="text-gray-500 text-center text-sm">没有账号？<span onclick="switchToRegister()" class="text-primary cursor-pointer">立即注册</span></p>
            </div>

            <div id="registerForm" class="hidden space-y-4">
                <div>
                    <label class="block text-gray-700 mb-1 text-sm font-medium">用户名</label>
                    <input id="regUser" class="border-gray-300 bg-gray-50 w-full p-3 rounded-lg border outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" placeholder="设置用户名">
                </div>
                <div>
                    <label class="block text-gray-700 mb-1 text-sm font-medium">密码</label>
                    <input id="regPwd" type="password" class="border-gray-300 bg-gray-50 w-full p-3 rounded-lg border outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" placeholder="设置密码">
                </div>
                <div>
                    <label class="block text-gray-700 mb-1 text-sm font-medium">用户权限</label>
                    <select id="regRole" class="border-gray-300 bg-gray-50 w-full p-3 rounded-lg border outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all">
                        <option value="user">普通用户（仅下载）</option>
                      
                    </select>
                </div>
                <button onclick="register()" class="bg-primary text-white w-full p-3 rounded-lg font-medium btn-hover">注册</button>
                <p class="text-gray-500 text-center text-sm">已有账号？<span onclick="switchToLogin()" class="text-primary cursor-pointer">返回登录</span></p>
            </div>
        </div>
    </div>

    <div id="mainPage" class="hidden p-4 md:p-6 min-h-screen">
        <div class="max-w-6xl mx-auto">
            <div class="bg-white rounded-xl card-shadow p-4 md:p-5 flex flex-col md:flex-row md:items-center justify-between mb-6">
                <div>
                    <h2 class="text-primary text-xl font-bold">文件管理中心</h2>
                    <p class="text-gray-500 mt-1 text-sm">欢迎：<span id="userName" class="text-primary font-medium"></span> | 权限：<span id="userRole" class="font-medium"></span></p>
                </div>
                <button onclick="logout()" class="bg-danger text-white mt-3 md:mt-0 px-5 py-2 rounded-lg font-medium btn-hover w-fit"><i class="fa-solid fa-right-from-bracket mr-1"></i> 退出登录</button>
            </div>

            <div id="uploadArea" class="bg-white rounded-xl card-shadow p-5 mb-6 hidden">
                <h3 class="text-gray-800 mb-4 text-lg font-semibold"><i class="fa-solid fa-cloud-arrow-up text-primary mr-2"></i>文件上传</h3>
                <div class="border-dashed border-2 border-gray-300 rounded-xl p-6 text-center bg-gray-50">
                    <input type="file" id="fileInput" multiple class="hidden">
                    <button onclick="document.getElementById('fileInput').click()" class="bg-primary text-white px-6 py-3 rounded-lg font-medium btn-hover"><i class="fa-solid fa-upload mr-2"></i>选择文件上传</button>
                    <p class="text-gray-500 mt-3 text-sm">支持任意格式文件，上传大小无限制</p>
                </div>
            </div>

            <div class="bg-white rounded-xl card-shadow p-5">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-gray-800 text-lg font-semibold"><i class="fa-solid fa-folder-open text-primary mr-2"></i>文件列表</h3>
                    <p class="text-gray-500 text-sm">花少云盘</p>
                </div>
                <div id="fileList" class="divide-gray-200 divide-y overflow-x-auto">
                    <div class="text-gray-500 grid grid-cols-12 pb-3 font-medium text-sm">
                        <div class="col-span-6">文件名</div>
                        <div class="col-span-3 text-center">大小</div>
                        <div class="col-span-3 text-center">操作</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const LOCAL_STORAGE_PATH = "D:\\MyFileServer";
        const ADMIN_USER = "huashao";
        const ADMIN_PWD = "hs848266888";

        let currentUser = null;
        let fileDatabase = null;

        // 初始化数据库 + 自动登录
        window.onload = async () => {
            await initDB();
            autoLogin();
        };

        function initDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open("FileStorageSystem", 1);
                request.onupgradeneeded = e => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("users")) db.createObjectStore("users", {keyPath: "username"});
                    if (!db.objectStoreNames.contains("files")) db.createObjectStore("files", {keyPath: "id", autoIncrement: true});
                };
                request.onsuccess = e => {
                    fileDatabase = e.target.result;
                    resolve();
                };
            });
        }

        // 自动登录（永久保存）
        function autoLogin() {
            const user = localStorage.getItem("loginUser");
            if (!user) return;
            
            if (user === ADMIN_USER) {
                currentUser = { username: ADMIN_USER, role: "admin" };
                showMain();
                return;
            }

            fileDatabase.transaction("users").objectStore("users").get(user).onsuccess = e => {
                const data = e.target.result;
                if (data) {
                    currentUser = data;
                    showMain();
                }
            };
        }

        function switchToRegister() {
            authTitle.textContent = "用户注册";
            loginForm.classList.add("hidden");
            registerForm.classList.remove("hidden");
        }
        function switchToLogin() {
            authTitle.textContent = "用户登录";
            registerForm.classList.add("hidden");
            loginForm.classList.remove("hidden");
        }

        // 注册（永久保存）
        function register() {
            const user = regUser.value.trim();
            const pwd = regPwd.value.trim();
            const role = regRole.value;
            
            if (!user || !pwd) { alert("请填写完整信息！"); return; }
            
            const tx = fileDatabase.transaction("users", "readwrite");
            tx.objectStore("users").get(user).onsuccess = e => {
                if (e.target.result) {
                    alert("用户名已存在！");
                } else {
                    tx.objectStore("users").add({ username: user, password: pwd, role: role });
                    alert("注册成功！账号永久保存");
                    switchToLogin();
                }
            };
        }

        // 登录（记住账号永久有效）
        function login() {
            const user = loginUser.value.trim();
            const pwd = loginPwd.value.trim();
            
            if (!user || !pwd) { alert("请填写账号密码！"); return; }

            if (user === ADMIN_USER && pwd === ADMIN_PWD) {
                currentUser = { username: ADMIN_USER, role: "admin" };
                localStorage.setItem("loginUser", user);
                showMain();
                return;
            }

            fileDatabase.transaction("users").objectStore("users").get(user).onsuccess = e => {
                const data = e.target.result;
                if (!data || data.password !== pwd) {
                    alert("账号或密码错误！");
                } else {
                    currentUser = data;
                    localStorage.setItem("loginUser", user);
                    showMain();
                }
            };
        }

        function showMain() {
            authPage.classList.add("hidden");
            mainPage.classList.remove("hidden");
            userName.textContent = currentUser.username;
            userRole.textContent = currentUser.role === "admin" ? "管理员" : "普通用户";
            if (currentUser.role === "admin") uploadArea.classList.remove("hidden");
            loadFileList();
        }

        // 退出登录（清除自动登录）
        function logout() {
            currentUser = null;
            localStorage.removeItem("loginUser");
            mainPage.classList.add("hidden");
            authPage.classList.remove("hidden");
            loginUser.value = "";
            loginPwd.value = "";
        }

        fileInput.onchange = async e => {
            const files = e.target.files;
            if (!files.length) return;
            for (let file of files) {
                const fileData = {
                    name: file.name,
                    size: formatFileSize(file.size),
                    uploadTime: new Date().toLocaleString(),
                    localPath: `${LOCAL_STORAGE_PATH}\\${file.name}`
                };
                await new Promise(r => {
                    fileDatabase.transaction("files", "readwrite").objectStore("files").add(fileData).onsuccess = r;
                });
                await saveFileToLocal(file);
            }
            alert("上传完成！");
            loadFileList();
            fileInput.value = "";
        };

        async function saveFileToLocal(file) {
            const handle = await window.showDirectoryPicker({ startIn: "documents", mode: "readwrite" });
            const fileHandle = await handle.getFileHandle(file.name, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(file);
            await writable.close();
        }

        function loadFileList() {
            fileList.querySelectorAll(".file-item").forEach(i => i.remove());
            fileDatabase.transaction("files").objectStore("files").openCursor().onsuccess = e => {
                const c = e.target.result;
                if (c) {
                    const f = c.value;
                    const div = document.createElement("div");
                    div.className = "py-3 file-item";
                    div.innerHTML = `
                    <div class="grid grid-cols-12 items-center">
                        <div class="col-span-6 font-medium"><i class="fa-solid fa-file text-primary mr-2"></i>${f.name}</div>
                        <div class="col-span-3 text-center text-sm text-gray-500">${f.size}</div>
                        <div class="col-span-3 text-center">
                            <button onclick="downloadFile('${f.id}')" class="bg-success text-white px-3 py-1 rounded text-sm btn-hover">下载</button>
                            ${currentUser.role === "admin" ? `<button onclick="deleteFile(${f.id})" class="bg-danger text-white px-3 py-1 rounded text-sm btn-hover ml-1">删除</button>` : ""}
                        </div>
                    </div>`;
                    fileList.appendChild(div);
                    c.continue();
                }
            };
        }

        function downloadFile(fileId) {
            fileDatabase.transaction("files").objectStore("files").get(Number(fileId)).onsuccess = e => {
                const f = e.target.result;
                const a = document.createElement("a");
                a.href = `file://${f.localPath.replace(/\\/g, "/")}`;
                a.download = f.name;
                a.click();
            };
        }

        function deleteFile(id) {
            if (!confirm("确定删除？")) return;
            fileDatabase.transaction("files", "readwrite").objectStore("files").delete(id).onsuccess = () => {
                loadFileList();
                alert("删除成功！");
            };
        }

        function formatFileSize(b) {
            if (b === 0) return "0 B";
            const k = 1024;
            const s = ["B", "KB", "MB", "GB"];
            const i = Math.floor(Math.log(b) / Math.log(k));
            return (b / Math.pow(k, i)).toFixed(2) + " " + s[i];
        }
    </script>
</body>
</html>
